<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClinicCall AI Dashboard</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main>
    <section class="hero">
      <div>
        <p class="badge">ClinicCall AI</p>
        <h1>AI Receptionist Dashboard</h1>
        <p>View appointment requests and recent AI call logs.</p>
      </div>
      <div class="login">
        <input id="password" type="password" placeholder="Admin password" />
        <button onclick="loadData()">Load Dashboard</button>
      </div>
    </section>

    <section class="grid">
      <div class="card">
        <h2>Appointment Requests</h2>
        <div id="appointments" class="list"></div>
      </div>

      <div class="card">
        <h2>Recent Calls</h2>
        <div id="calls" class="list"></div>
      </div>
    </section>
  </main>

<script>
async function api(path, options = {}) {
  const password = document.getElementById("password").value;
  const res = await fetch(path + "?password=" + encodeURIComponent(password), {
    headers: { "Content-Type": "application/json", "x-admin-password": password },
    ...options
  });
  if (!res.ok) throw new Error("Wrong password or server error");
  return res.json();
}

function escapeHtml(text) {
  return String(text || "").replace(/[&<>"']/g, s => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
  }[s]));
}

async function markDone(id) {
  await api("/api/appointments/" + id, {
    method: "PATCH",
    body: JSON.stringify({ status: "done" })
  });
  loadData();
}

async function loadData() {
  try {
    const [appointments, calls] = await Promise.all([
      api("/api/appointments"),
      api("/api/calls")
    ]);

    document.getElementById("appointments").innerHTML = appointments.length ? appointments.map(a => `
      <div class="item">
        <div class="row">
          <strong>${escapeHtml(a.name)}</strong>
          <span class="status">${escapeHtml(a.status)}</span>
        </div>
        <p><b>Phone:</b> ${escapeHtml(a.from)}</p>
        <p><b>Preferred time:</b> ${escapeHtml(a.preferredTime)}</p>
        <p><b>Reason:</b> ${escapeHtml(a.reason)}</p>
        <small>${new Date(a.createdAt).toLocaleString()}</small>
        ${a.status !== "done" ? `<button class="small" onclick="markDone('${a.id}')">Mark done</button>` : ""}
      </div>
    `).join("") : "<p>No appointment requests yet.</p>";

    document.getElementById("calls").innerHTML = calls.length ? calls.map(c => `
      <div class="item">
        <div class="row">
          <strong>${escapeHtml(c.intent)}</strong>
          <small>${new Date(c.time).toLocaleString()}</small>
        </div>
        <p><b>From:</b> ${escapeHtml(c.from)}</p>
        <p><b>Caller:</b> ${escapeHtml(c.speech)}</p>
        <p><b>AI:</b> ${escapeHtml(c.reply)}</p>
      </div>
    `).join("") : "<p>No calls yet.</p>";
  } catch (e) {
    alert(e.message);
  }
}
</script>
</body>
</html>
